<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTH Forge — Vinculum Protocol</title>
<meta name="description" content="A scroll-driven simulation of the SYNTH forging mechanic. 1,000 VCLM and 10,000 CHONX burn together to create one SYNTH. Illustrative values only.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#fafaf8;
    --off-white:#f4f3ef;
    --black:#0a0a0a;
    --mid:#6b6b65;
    --blue:#1a1a2e;
    --vclm:#8fb8e8;    /* VCLM steel-blue */
    --chonx:#F4B400;   /* CHONX primary gold (style guide) */
    --ember:#ffb35c;   /* forge ember */
    --synth:#ffe9c4;   /* white-hot */
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--black);
    color:var(--off-white);
    font-family:'DM Sans', sans-serif;
    font-weight:300;
    overflow-x:hidden;
  }

  /* ---------- fixed chrome ---------- */
  .chrome{
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:baseline;
    padding:1.4rem 1.8rem;
    z-index:40;
    pointer-events:none;
    mix-blend-mode:screen;
  }
  .chrome .mark{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:1.05rem;
    letter-spacing:.42em;
    color:var(--off-white);
  }
  .chrome .mode{
    font-size:.62rem;
    font-weight:400;
    letter-spacing:.34em;
    color:var(--mid);
    text-transform:uppercase;
  }

  /* ---------- scroll track + sticky stage ---------- */
  .track{ height:760vh; position:relative; }
  .stage{
    position:sticky; top:0;
    height:100vh; width:100%;
    overflow:hidden;
    background:linear-gradient(135deg, #060a10 0%, #0d1b2a 40%, #1a1a2e 70%, #060a10 100%);
  }
  canvas#field{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
  }

  /* ---------- title ---------- */
  .headline{
    position:absolute; left:50%; top:15vh;
    transform:translateX(-50%);
    width:min(92vw, 900px);
    text-align:center;
    pointer-events:none;
  }
  .headline h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(1.45rem, 4vw, 2.5rem);
    letter-spacing:.08em;
    color:var(--off-white);
  }
  .headline .num{ color:var(--white); }
  .hint{
    position:absolute; bottom:2.4rem; left:50%; transform:translateX(-50%);
    font-size:.6rem; font-weight:400;
    letter-spacing:.4em; text-transform:uppercase;
    color:var(--mid);
    pointer-events:none;
  }
  .hint::after{
    content:""; display:block;
    width:1px; height:34px;
    margin:.8rem auto 0;
    background:linear-gradient(to bottom, var(--mid), transparent);
  }

  /* ---------- token coins ---------- */
  .coin{
    position:absolute;
    width:var(--coin);
    height:var(--coin);
    transform:translate(-50%,-50%);
    pointer-events:none;
  }
  .coin img{
    width:100%; height:100%;
    display:block;
  }
  .coin .tag{
    position:absolute; left:50%; top:calc(100% + 1.1rem);
    transform:translateX(-50%);
    text-align:center;
    white-space:nowrap;
  }
  .coin .tag .value{
    font-weight:200;
    font-size:clamp(1.5rem, 4.2vw, 2.6rem);
    letter-spacing:.04em;
    font-variant-numeric:tabular-nums;
  }
  .coin.vclm .tag .value{ color:var(--vclm); }
  .coin.chonx .tag .value{ color:var(--chonx); }
  .coin .tag .label{
    margin-top:.3rem;
    font-size:.58rem; font-weight:400;
    letter-spacing:.34em; text-transform:uppercase;
    color:var(--mid);
  }

  /* ---------- forged SYNTH ---------- */
  .synth{
    position:absolute; left:50%; top:44%;
    width:var(--synthsize);
    height:var(--synthsize);
    transform:translate(-50%,-50%) scale(.2);
    opacity:0;
    pointer-events:none;
  }
  .synth img{
    width:100%; height:100%;
    display:block;
    filter:drop-shadow(0 0 26px rgba(255,179,92,.5)) drop-shadow(0 0 60px rgba(255,233,196,.25));
  }

  /* ---------- flash ---------- */
  .flash{
    position:absolute; inset:0;
    background:radial-gradient(circle at 50% 44%, rgba(255,240,214,.96) 0%, rgba(255,179,92,.5) 24%, transparent 60%);
    opacity:0;
    pointer-events:none;
  }

  /* ---------- resolution ---------- */
  .resolution{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    text-align:center;
    padding-bottom:6vh;
    opacity:0;
    pointer-events:none;
  }
  .resolution .title{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(1.3rem, 3.2vw, 2rem);
    letter-spacing:.1em;
    color:var(--off-white);
  }
  .stats{
    display:flex; gap:clamp(1.4rem, 5vw, 4rem);
    margin-top:1.6rem;
    flex-wrap:wrap;
    justify-content:center;
  }
  .stat .n{
    font-weight:200;
    font-size:clamp(1rem, 2.4vw, 1.5rem);
    letter-spacing:.04em;
    color:var(--white);
    font-variant-numeric:tabular-nums;
  }
  .stat .l{
    margin-top:.4rem;
    font-size:.56rem; font-weight:400;
    letter-spacing:.3em; text-transform:uppercase;
    color:var(--mid);
  }
  .again{
    margin-top:1.9rem;
    pointer-events:auto;
    background:none;
    border:1px solid rgba(244,243,239,.25);
    color:var(--off-white);
    font-family:'DM Sans', sans-serif;
    font-weight:400;
    font-size:.62rem;
    letter-spacing:.38em;
    text-transform:uppercase;
    padding:.85rem 2.1rem .8rem 2.4rem;
    cursor:pointer;
    transition:border-color .5s ease, background .5s ease;
  }
  .again:hover{ border-color:rgba(255,179,92,.7); background:rgba(255,179,92,.06); }
  .again:focus-visible{ outline:1px solid var(--ember); outline-offset:3px; }
  .fineprint{
    margin-top:1.2rem;
    font-size:.54rem; font-weight:300;
    letter-spacing:.22em; text-transform:uppercase;
    color:rgba(107,107,101,.75);
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
  }
</style>
</head>

<script>
(function(){
  "use strict";

  /* ============ helpers ============ */
  const clamp = (v,a,b)=> v<a?a : v>b?b : v;
  const seg = (p,a,b)=> clamp((p-a)/(b-a), 0, 1);
  const easeIO = t => t<.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  const easeOut = t => 1 - Math.pow(1-t, 3);
  const easeIn  = t => t*t*t;
  const lerp = (a,b,t)=> a+(b-a)*t;
  const fmt = n => Math.round(n).toLocaleString('en-US');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let seed = 7411;
  const rand = ()=>{ seed = (seed*16807) % 2147483647; return (seed-1)/2147483646; };

  /* ============ elements ============ */
  const track      = document.getElementById('track');
  const stage      = document.getElementById('stage');
  const canvas     = document.getElementById('field');
  const ctx        = canvas.getContext('2d');
  const headline   = document.getElementById('headline');
  const hint       = document.getElementById('hint');
  const coinVclm   = document.getElementById('coinVclm');
  const coinChonx  = document.getElementById('coinChonx');
  const imgVclm    = document.getElementById('imgVclm');
  const imgChonx   = document.getElementById('imgChonx');
  const imgSynth   = document.getElementById('imgSynth');
  const vclmValue  = document.getElementById('vclmValue');
  const chonxValue = document.getElementById('chonxValue');
  const flash      = document.getElementById('flash');
  const synthEl    = document.getElementById('synth');
  const resolution = document.getElementById('resolution');
  const totalForged= document.getElementById('totalForged');
  const again      = document.getElementById('again');

  /* ============ layout ============ */
  let W=0, H=0, DPR=1;
  let coinSize=0, synthSize=0;
  let vclmC={x:0,y:0}, chonxC={x:0,y:0}, forgeC={x:0,y:0};

  function layout(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = stage.clientWidth;
    H = stage.clientHeight;
    canvas.width  = Math.floor(W*DPR);
    canvas.height = Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);

    const portrait = W < 640;
    coinSize  = portrait ? Math.min(W*0.34, H*0.24) : Math.min(W*0.22, H*0.32, 250);
    synthSize = portrait ? Math.min(W*0.5, H*0.3)   : Math.min(W*0.28, H*0.38, 300);

    const y = portrait ? H*0.42 : H*0.46;
    vclmC  = { x: portrait ? W*0.26 : W*0.28, y };
    chonxC = { x: portrait ? W*0.74 : W*0.72, y };
    forgeC = { x: W*0.5, y: H*0.44 };

    document.documentElement.style.setProperty('--coin', coinSize+'px');
    document.documentElement.style.setProperty('--synthsize', synthSize+'px');
    coinVclm.style.left  = vclmC.x+'px';  coinVclm.style.top  = vclmC.y+'px';
    coinChonx.style.left = chonxC.x+'px'; coinChonx.style.top = chonxC.y+'px';

    mapParticles();
  }
  window.addEventListener('resize', layout, {passive:true});

  /* ============ pixel sampling ============ */
  const SAMPLE = 156;
  const STEP   = 3;

  function sampleImage(img){
    const off = document.createElement('canvas');
    off.width = SAMPLE; off.height = SAMPLE;
    const octx = off.getContext('2d', { willReadFrequently:true });
    octx.drawImage(img, 0, 0, SAMPLE, SAMPLE);
    const data = octx.getImageData(0,0,SAMPLE,SAMPLE).data;
    const grains = [];
    for(let gy=1; gy<SAMPLE; gy+=STEP){
      for(let gx=1; gx<SAMPLE; gx+=STEP){
        const i = (gy*SAMPLE+gx)*4;
        const a = data[i+3];
        if(a<90) continue;
        grains.push({
          u:(gx+0.5)/SAMPLE - 0.5,
          v:(gy+0.5)/SAMPLE - 0.5,
          r:data[i], g:data[i+1], b:data[i+2],
          s: 0.55 + rand()*0.45,
          curl: (rand()-0.5)*2,
          lift: 0.4 + rand()*0.9,
          tw: rand()*Math.PI*2,
          sz: 1.4 + rand()*1.5
        });
      }
    }
    return grains;
  }

  let vGrains=[], cGrains=[], sGrains=[];
  let loaded = 0;
  function tryInit(){
    loaded++;
    if(loaded<3) return;
    vGrains = sampleImage(imgVclm);
    cGrains = sampleImage(imgChonx);
    sGrains = sampleImage(imgSynth);
    for(const g of vGrains) g.s = clamp(0.65 - g.u*0.9 + (rand()-0.5)*0.25, 0, 1)*0.6;
    for(const g of cGrains) g.s = clamp(0.65 + g.u*0.9 + (rand()-0.5)*0.25, 0, 1)*0.6;
    for(const g of sGrains) g.s = rand()*0.5;
    mapParticles();
  }
  [imgVclm, imgChonx, imgSynth].forEach(img=>{
    if(img.complete && img.naturalWidth) tryInit();
    else img.addEventListener('load', tryInit, {once:true});
  });

  function mapParticles(){
    for(const g of vGrains){ g.hx = vclmC.x + g.u*coinSize;  g.hy = vclmC.y + g.v*coinSize; }
    for(const g of cGrains){ g.hx = chonxC.x + g.u*coinSize; g.hy = chonxC.y + g.v*coinSize; }
    for(const g of sGrains){ g.hx = forgeC.x + g.u*synthSize; g.hy = forgeC.y + g.v*synthSize; }
  }

  /* stray sparks for the birth moment */
  let sparks = [];
  (function buildSparks(){
    for(let i=0;i<130;i++){
      const a = rand()*Math.PI*2;
      sparks.push({
        a, dist: 90 + rand()*380,
        sz: 0.8 + rand()*2,
        delay: rand()*0.3,
        warm: rand()
      });
    }
  })();

  /* ============ timeline ============
     0.00 – 0.10  landing
     0.10 – 0.26  heat
     0.26 – 0.58  dissolve
     0.58 – 0.68  convergence
     0.68 – 0.71  flash
     0.71 – 0.86  birth
     0.86 – 1.00  resolution                                        */

  let progress = 0;
  let statsRun = false;
  let statTimer = null;
  let synthRise = 0;   /* how far SYNTH lifts to clear the stats */

  function onScroll(){
    const rect = track.getBoundingClientRect();
    const total = rect.height - window.innerHeight;
    progress = clamp(-rect.top / total, 0, 1);
  }
  window.addEventListener('scroll', onScroll, {passive:true});

  function synthCenterY(){ return forgeC.y + synthRise; }

  function draw(now){
    requestAnimationFrame(draw);
    const p = progress;
    const tSec = now/1000;
    ctx.clearRect(0,0,W,H);

    const heat     = seg(p, 0.10, 0.26);
    const dissolve = seg(p, 0.26, 0.58);
    const tighten  = seg(p, 0.58, 0.68);
    const burst    = seg(p, 0.71, 0.86);
    const settle   = seg(p, 0.86, 1.00);
    const res      = easeIO(seg(p, 0.88, 0.95));
    synthRise = -res * H * 0.11;

    ctx.globalCompositeOperation = 'lighter';

    /* ---- pre-dissolve stray embers rising off the rims ---- */
    if(heat>0 && dissolve<0.2){
      const n = Math.floor(heat*26);
      for(let i=0;i<n;i++){
        const side = i%2===0 ? vclmC : chonxC;
        const col  = i%2===0 ? [143,184,232] : [244,180,0];
        const ph = (tSec*0.35 + i*0.618) % 1;
        const ang = (i*2.399) % (Math.PI*2);
        const x = side.x + Math.cos(ang)*coinSize*0.52 + Math.sin(tSec+i)*6;
        const y = side.y + Math.sin(ang)*coinSize*0.52 - ph*70;
        const a = (1-ph)*0.5*heat*(1-dissolve*5);
        if(a<=0) continue;
        ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${a})`;
        ctx.fillRect(x, y, 2, 2);
      }
    }

    /* ---- token grains: dissolve, stream, converge ---- */
    if(dissolve>0 && burst===0){
      const groups = [vGrains, cGrains];
      for(let gi=0; gi<groups.length; gi++){
        const grains = groups[gi];
        for(let i=0;i<grains.length;i++){
          const g = grains[i];
          const d = seg(dissolve, g.s, g.s+0.4);
          let x, y, heatMix;
          if(d<=0){
            if(dissolve<0.05) continue;
            x = g.hx; y = g.hy; heatMix = 0;
          }else{
            const e = easeIn(d);
            x = lerp(g.hx, forgeC.x, e);
            y = lerp(g.hy, forgeC.y, e);
            const wave = Math.sin(d*Math.PI);
            x += g.curl * 46 * wave;
            y -= g.lift * 60 * wave;
            heatMix = d;
          }
          if(tighten>0){
            const k = easeIn(tighten);
            const ang = Math.atan2(y-forgeC.y, x-forgeC.x) + k*2.2;
            const distNow = Math.hypot(x-forgeC.x, y-forgeC.y)*(1-k);
            x = forgeC.x + Math.cos(ang)*distNow;
            y = forgeC.y + Math.sin(ang)*distNow;
          }
          const hot = clamp(heatMix*0.5 + tighten*0.7, 0, 1);
          const r = Math.round(lerp(g.r, 255, hot));
          const gg= Math.round(lerp(g.g, 233, hot));
          const b = Math.round(lerp(g.b, 196, hot));
          const flick = 0.7 + 0.3*Math.sin(tSec*5 + g.tw);
          const alpha = (d<=0 ? seg(dissolve,0.05,0.3)*0.5
                              : (0.55 + 0.35*Math.sin(d*Math.PI)) )
                        * flick * (1 - tighten*0.3);
          ctx.fillStyle = `rgba(${r},${gg},${b},${clamp(alpha,0,1)})`;
          const sz = g.sz*(1 - tighten*0.4);
          ctx.fillRect(x-sz/2, y-sz/2, sz, sz);
        }
      }

      if(tighten>0){
        const coreR = 3 + easeIn(tighten)*16;
        const grd = ctx.createRadialGradient(forgeC.x,forgeC.y,0,forgeC.x,forgeC.y,coreR*3.4);
        grd.addColorStop(0, `rgba(255,240,214,${tighten})`);
        grd.addColorStop(0.5, `rgba(255,179,92,${tighten*0.55})`);
        grd.addColorStop(1, 'rgba(255,179,92,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(forgeC.x,forgeC.y,coreR*3.4,0,Math.PI*2);
        ctx.fill();
      }
    }

    /* ---- birth: SYNTH grains fly outward from the point ---- */
    const sy = synthCenterY();
    if(burst>0 && burst<1){
      for(const g of sGrains){
        const local = seg(burst, g.s*0.4, g.s*0.4+0.5);
        if(local<=0) continue;
        const e = easeOut(local);
        const x = lerp(forgeC.x, forgeC.x + g.u*synthSize, e);
        const y = lerp(forgeC.y, sy + g.v*synthSize, e);
        const hot = 1-local;
        const r = Math.round(lerp(g.r, 255, hot));
        const gg= Math.round(lerp(g.g, 233, hot));
        const b = Math.round(lerp(g.b, 196, hot));
        const alpha = (0.9 - seg(burst,0.75,1)*0.9) * (0.6+0.4*Math.sin(tSec*5+g.tw));
        ctx.fillStyle = `rgba(${r},${gg},${b},${clamp(alpha,0,1)})`;
        ctx.fillRect(x-g.sz/2, y-g.sz/2, g.sz, g.sz);
      }
      for(const s of sparks){
        const local = seg(burst, s.delay, 1);
        if(local<=0) continue;
        const e = easeOut(local);
        const x = forgeC.x + Math.cos(s.a)*s.dist*e;
        const y = forgeC.y + Math.sin(s.a)*s.dist*e + local*local*40;
        const r = Math.round(lerp(255, 244, s.warm));
        const g = Math.round(lerp(179, 180, s.warm));
        const b = Math.round(lerp(92, 0, s.warm));
        const alpha = (1-local)*(1-local)*0.9;
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fillRect(x, y, s.sz, s.sz);
      }
    }

    /* ---- the living flame inside the settled SYNTH coin ---- */
    const synthVis = easeOut(seg(p, 0.76, 0.87));
    if(synthVis>0.1 && !reduceMotion){
      const scale = 0.25 + easeOut(seg(p, 0.71, 0.9))*0.75;
      const cur = synthSize*scale;
      /* the flame mark sits just above the coin's center */
      const fx = forgeC.x;
      const fy = sy - cur*0.055;
      const fw = cur*0.15, fh = cur*0.2;

      /* breathing firelight: three soft blobs flickering at odd tempos */
      const f1 = 0.6 + 0.4*Math.sin(tSec*3.7);
      const f2 = 0.6 + 0.4*Math.sin(tSec*5.3 + 1.7);
      const f3 = 0.6 + 0.4*Math.sin(tSec*8.1 + 3.9);
      const blobs = [
        [fx,                 fy - fh*0.1,  fh*0.9,  0.12*f1],
        [fx - fw*0.3*f2,     fy + fh*0.35, fh*0.55, 0.09*f2],
        [fx + fw*0.35*f3,    fy - fh*0.45, fh*0.5,  0.08*f3]
      ];
      for(const [bx,by,br,ba] of blobs){
        const grd = ctx.createRadialGradient(bx,by,0,bx,by,br);
        grd.addColorStop(0, `rgba(255,214,140,${ba*synthVis})`);
        grd.addColorStop(0.55, `rgba(255,164,72,${ba*0.5*synthVis})`);
        grd.addColorStop(1, 'rgba(255,140,50,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(bx,by,br,0,Math.PI*2);
        ctx.fill();
      }

      /* embers climbing off the flame tip */
      for(let i=0;i<12;i++){
        const ph = (tSec*0.5 + i*0.083) % 1;
        const sway = Math.sin(tSec*1.6 + i*2.3) * fw*0.5 * (0.3+ph);
        const x = fx + sway*(1-ph*0.4);
        const y = fy + fh*0.4 - ph*fh*2.1;
        const a = Math.sin(ph*Math.PI)*0.45*synthVis;
        const warm = i%3;
        const col = warm===0 ? '255,230,170' : warm===1 ? '255,190,100' : '255,160,70';
        ctx.fillStyle = `rgba(${col},${a})`;
        const esz = 1.5 + (1-ph);
        ctx.fillRect(x-esz/2, y-esz/2, esz, esz);
      }
    }

    /* ---- settled halo + drifting embers ---- */
    if(settle>0){
      const halo = ctx.createRadialGradient(forgeC.x,sy,0,forgeC.x,sy,synthSize*0.9);
      halo.addColorStop(0, `rgba(255,200,120,${0.08*settle})`);
      halo.addColorStop(1, 'rgba(255,200,120,0)');
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(forgeC.x,sy,synthSize*0.9,0,Math.PI*2);
      ctx.fill();
      for(let i=0;i<10;i++){
        const ph = (tSec*0.18 + i*0.1) % 1;
        const x = forgeC.x + Math.sin(i*2.4 + tSec*0.4)*synthSize*0.5;
        const y = sy + synthSize*0.45 - ph*synthSize*1.1;
        const a = Math.sin(ph*Math.PI)*0.35*settle;
        ctx.fillStyle = `rgba(255,190,110,${a})`;
        ctx.fillRect(x, y, 2, 2);
      }
    }

    ctx.globalCompositeOperation = 'source-over';
    updateDom(p, heat, dissolve, tighten, burst, settle, res, tSec);
  }

  /* ============ DOM overlay sync ============ */
  function updateDom(p, heat, dissolve, tighten, burst, settle, res, tSec){
    const hOut = easeIO(seg(p, 0.06, 0.14));
    headline.style.opacity = 1 - hOut;
    headline.style.transform = `translateX(-50%) translateY(${-hOut*36}px)`;
    hint.style.opacity = 1 - easeIO(seg(p, 0.02, 0.07));

    const erode = easeIO(seg(dissolve, 0, 0.4));
    const glow = 14 + heat*30;
    const pulse = reduceMotion ? 0 : Math.sin(tSec*2.2)*heat*6;
    imgVclm.style.filter  = `drop-shadow(0 0 ${glow+pulse}px rgba(143,184,232,${0.35+heat*0.4})) brightness(${1+heat*0.25})`;
    imgChonx.style.filter = `drop-shadow(0 0 ${glow+pulse}px rgba(244,180,0,${0.35+heat*0.4})) brightness(${1+heat*0.25})`;
    imgVclm.style.opacity  = 1 - erode;
    imgChonx.style.opacity = 1 - erode;

    const cIn  = seg(p, 0.11, 0.18);
    const cOut = seg(p, 0.56, 0.64);
    const cVis = easeIO(cIn)*(1-easeIO(cOut));
    const tagV = coinVclm.querySelector('.tag');
    const tagC = coinChonx.querySelector('.tag');
    tagV.style.opacity = cVis;
    tagC.style.opacity = cVis;
    const fill = easeIO(seg(p, 0.13, 0.58));
    vclmValue.textContent  = fmt(fill*1000);
    chonxValue.textContent = fmt(fill*10000);

    const f = seg(p, 0.68, 0.705);
    const fFade = seg(p, 0.705, 0.78);
    const flashA = easeIO(f)*(1-easeOut(fFade));
    flash.style.opacity = reduceMotion ? Math.min(flashA,.45) : flashA;

    /* SYNTH coin: crossfades in, grows, then lifts to sit above the stats */
    const mIn = easeOut(seg(p, 0.76, 0.87));
    const scale = 0.25 + easeOut(seg(p, 0.71, 0.9))*0.75;
    const breathe = reduceMotion ? 0 : Math.sin(tSec*2.6)*0.008*mIn;
    synthEl.style.opacity = mIn;
    synthEl.style.transform =
      `translate(-50%,-50%) translateY(${synthRise}px) scale(${scale+breathe}) rotate(${(1-mIn)*10}deg)`;

    resolution.style.opacity = res;
    resolution.style.pointerEvents = res>0.5 ? 'auto' : 'none';
    if(res>0.5 && !statsRun){
      statsRun = true;
      runStat(totalForged, 12847, 1400);
    }
    if(res<=0 && statsRun){
      statsRun = false;
      if(statTimer) cancelAnimationFrame(statTimer);
      totalForged.textContent = '0';
    }
  }

  function runStat(el, target, dur){
    const t0 = performance.now();
    function step(t){
      const k = clamp((t-t0)/dur, 0, 1);
      el.textContent = fmt(easeOut(k)*target);
      if(k<1) statTimer = requestAnimationFrame(step);
    }
    statTimer = requestAnimationFrame(step);
  }

  /* ============ forge another ============ */
  again.addEventListener('click', ()=>{
    statsRun = false;
    window.scrollTo({ top:0, behavior: reduceMotion ? 'auto' : 'smooth' });
  });

  /* ============ boot ============ */
  layout();
  onScroll();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
